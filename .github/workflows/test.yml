name: Test Suite

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # nexus-api tests
  # ---------------------------------------------------------------------------
  api-tests:
    name: API Tests (nexus-api)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/nexus-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/nexus-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/nexus-api/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # nexus-web tests
  # ---------------------------------------------------------------------------
  web-tests:
    name: Web Tests (nexus-web)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/nexus-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/nexus-web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/nexus-web/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Summary gate — both suites must pass
  # ---------------------------------------------------------------------------
  all-tests:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [api-tests, web-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.api-tests.result }}" != "success" || "${{ needs.web-tests.result }}" != "success" ]]; then
            echo "One or more test suites failed."
            exit 1
          fi
          echo "All test suites passed."
