name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository_owner }}/nexus-api
  IMAGE_WEB: ${{ github.repository_owner }}/nexus-web

jobs:
  # -----------------------------------------------------------------------
  # Build & test
  # -----------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install API dependencies
        working-directory: apps/nexus-api
        run: npm ci --if-present || echo "No package.json — skipping install"

      - name: Install Web dependencies
        working-directory: apps/nexus-web
        run: npm ci --if-present || echo "No package.json — skipping install"

      - name: Type-check API
        working-directory: apps/nexus-api
        run: npm run typecheck --if-present || npx tsc --noEmit --skipLibCheck 2>/dev/null || echo "Type-check skipped — no tsconfig"

      - name: Type-check Web
        working-directory: apps/nexus-web
        run: npm run typecheck --if-present || npx tsc --noEmit --skipLibCheck 2>/dev/null || echo "Type-check skipped — no tsconfig"

      - name: Run API tests
        working-directory: apps/nexus-api
        run: npm test --if-present || echo "No tests configured"

      - name: Run Web tests
        working-directory: apps/nexus-web
        run: npm test --if-present || echo "No tests configured"

  # -----------------------------------------------------------------------
  # Build & push Docker images (main branch only)
  # -----------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            API_URL=${{ secrets.API_URL || 'http://nexus-api:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------------
  # Deploy (main branch only — extend for your hosting target)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Railway deployment (uncomment and configure) ----
      # - name: Install Railway CLI
      #   run: npm install -g @railway/cli
      #
      # - name: Deploy API to Railway
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #   run: railway up --service nexus-api
      #
      # - name: Deploy Web to Railway
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #   run: railway up --service nexus-web

      # ---- Vercel deployment (uncomment and configure) ----
      # - name: Deploy Web to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     working-directory: apps/nexus-web
      #     vercel-args: "--prod"

      - name: Deployment summary
        run: |
          echo "### Nexus Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Web image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Uncomment the Railway or Vercel steps in \`.github/workflows/deploy.yml\` to activate live deployment." >> $GITHUB_STEP_SUMMARY
