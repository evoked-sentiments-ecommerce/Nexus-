version: "3.9"

services:
  nexus-api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    image: nexus-api:latest
    container_name: nexus-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Add your secrets via a .env file or environment injection:
      # DATABASE_URL: ${DATABASE_URL}
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "3000:3000"
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nexus-web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        API_URL: http://nexus-api:3000
    image: nexus-web:latest
    container_name: nexus-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      API_URL: http://nexus-api:3000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3001:3001"
    depends_on:
      nexus-api:
        condition: service_healthy
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge
