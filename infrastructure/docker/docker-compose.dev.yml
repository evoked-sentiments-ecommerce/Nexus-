version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_dev
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  nexus-api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
      target: builder
    restart: unless-stopped
    volumes:
      - ../../apps/nexus-api/src:/app/src:ro
      - ../../apps/nexus-api/tests:/app/tests:ro
    environment:
      NODE_ENV: development
      DATABASE_URL: ******postgres:5432/nexus_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      EMAIL_FROM: dev@nexus.app
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: ["npx", "ts-node-dev", "--respawn", "--transpile-only", "src/index.ts"]

  nexus-web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      target: builder
    restart: unless-stopped
    volumes:
      - ../../apps/nexus-web/src:/app/src:ro
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - nexus-api

volumes:
  postgres_dev_data:
  redis_dev_data:
